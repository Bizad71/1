<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نمایش کلمات فایل Word</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:tahoma;
        }

        body{
            background:#f2f2f2;
            padding:30px;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:#fff;
            border-radius:12px;
            padding:20px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input[type=file],
        input[type=text]{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        #count{
            margin:15px 0;
            font-weight:bold;
        }

        #words{
            display:flex;
            flex-wrap:wrap;
            gap:10px;
        }

        .word{
            background:#1976d2;
            color:white;
            padding:8px 12px;
            border-radius:8px;
            cursor:pointer;
            transition:.2s;
        }

        .word:hover{
            background:#0d47a1;
            transform:scale(1.05);
        }
    </style>

</head>

<body>

<div class="container">

    <h2>نمایش کلمات فایل Word</h2>

    <input id="file" type="file" accept=".docx">

    <input id="search" type="text" placeholder="جستجوی کلمه...">

    <div id="count">تعداد کلمات: 0</div>

    <div id="words"></div>

</div>

<!-- کتابخانه خواندن فایل Word -->
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<!-- فایل جاوااسکریپت -->
<script src="word.js"></script>

</body>
</html>

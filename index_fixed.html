<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لغات روزانه</title>

<style>
body{
    font-family:tahoma;
    background:#f3f3f3;
    margin:0;
    padding:20px;
}
h1{
    text-align:center;
}
#words{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.word{
    font-size:22px;
    font-weight:bold;
    color:#1565c0;
}

.meaning{
    margin-top:10px;
    color:#444;
}

.example{
    margin-top:10px;
    color:#666;
    font-style:italic;
}
</style>
</head>

<body>

<h1>لغات امروز</h1>

<div id="words"></div>

<script src="words.js"></script>

<script>

const PER_DAY = 20;

// شماره روز از ابتدای سال
const today = new Date();
const start = new Date(today.getFullYear(),0,0);
const day = Math.floor((today-start)/86400000);

// انتخاب ۲۰ کلمه
const startIndex = ((day-1)*PER_DAY) % WORDS.length;

const list=[];

for(let i=0;i<PER_DAY;i++){
    list.push(WORDS[(startIndex+i)%WORDS.length]);
}

const box=document.getElementById("words");

list.forEach(item=>{
    box.innerHTML+=`
    <div class="card">
        <div class="word">${item.word}</div>
        <div class="meaning">${item.meaning}</div>
        <div class="example">${item.example}</div>
    </div>
    `;
});

</script>

</body>
</html>
